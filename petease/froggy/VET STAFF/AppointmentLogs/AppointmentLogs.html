<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../Dashboard.css">
    <link rel="stylesheet" href="ViewAppointmentLogs.css">
    <title>View Appointment Logs - Vet Staff</title>
</head>
<body>
    <header class="header">
        <div class="logo">
            <img src="../../logo.png" alt="PetEase Logo">
            <h1>PetEase - Vet Staff</h1>
        </div>
        <nav class="header-nav">
            <a href="../../user/login/index.html" id="logout-btn">Logout</a>
        </nav>
    </header>

    <div class="container">
        <aside class="sidebar">
            <nav>
                <ul>
                    <li><a class="dashboard" href="../Dashboard.html">Dashboard</a></li>
                    <li><a class="pending-appointments" href="../PendingAppointments/PendingAppointments.html">Pending Appointments</a></li>
                    <li><a class="confirmed-appointments" href="../ConfirmedAppointment/ConfirmedAppointments.html">Confirmed Appointments</a></li>
                    <li><a class="appointment-logs" href="AppointmentLogs.html">Appointment Logs</a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <h2>Appointment Logs</h2>
            <div id="feedback-message" class="feedback hidden"></div>

            <div class="filters-section">
                <div class="filter-group">
                    <label for="date-from">From Date:</label>
                    <input type="date" id="date-from">
                </div>
                <div class="filter-group">
                    <label for="date-to">To Date:</label>
                    <input type="date" id="date-to">
                </div>
                <div class="filter-group">
                    <label for="status-filter">Status:</label>
                    <select id="status-filter">
                        <option value="all">All Statuses</option>
                        <option value="completed">Completed</option>
                        <option value="cancelled">Cancelled</option>
                        <option value="no-show">No Show</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="search-input">Search:</label>
                    <input type="text" id="search-input" placeholder="Pet name, owner, or service">
                </div>
                <button id="apply-filters-btn" class="btn btn-primary">Apply Filters</button>
                <button id="export-btn" class="btn btn-secondary">Export to CSV</button>
            </div>

            <div class="summary-stats">
                <div class="stat-card">
                    <h3>Total Appointments</h3>
                    <p id="total-appointments">0</p>
                </div>
                <div class="stat-card">
                    <h3>Completed</h3>
                    <p id="completed-appointments">0</p>
                </div>
                <div class="stat-card">
                    <h3>Cancelled</h3>
                    <p id="cancelled-appointments">0</p>
                </div>
                <div class="stat-card">
                    <h3>No Shows</h3>
                    <p id="no-show-appointments">0</p>
                </div>
            </div>

            <div class="logs-table-container">
                <table class="logs-table">
                    <thead>
                        <tr>
                            <th>Date</th> <!-- this should be appointmentDate -->
                            <th>Pet Name</th>
                            <th>Type</th>
                            <th>Color</th>
                            <th>Gender</th>
                            <th>Owner</th>
                            <th>Address</th>
                            <th>Service</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="logs-table-body">
                        <!-- Log entries will be populated here -->
                    </tbody>
                </table>
            </div>

            <div class="pagination">
                <button id="prev-page" disabled>Previous</button>
                <span id="page-info">Page 1 of 1</span>
                <button id="next-page" disabled>Next</button>
            </div>
        </main>
    </div>

    <script src="ViewAppointmentLogs.js"></script>
</body>
</html>
