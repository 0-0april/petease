<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../Dashboard.css">
    <link rel="stylesheet" href="ConfirmedAppointments.css">
    <title>View Confirmed Appointments - Vet Staff</title>
</head>
<body>
    <header class="header">
        <div class="logo">
            <img src="../../logo.png" alt="PetEase Logo">
            <h1>PetEase - Vet Staff</h1>
        </div>
        <nav class="header-nav">
            <a href="../../user/login/index.html" id="logout-btn">Logout</a>
        </nav>
    </header>

    <div class="container">
       <aside class="sidebar">
            <nav>
                <ul>
                    <li><a class="dashboard" href="../Dashboard.html">Dashboard</a></li>
                    <li><a class="pending-appointments" href="../PendingAppointments/PendingAppointments.html">Pending Appointments</a></li>
                    <li><a class="confirmed-appointments" href="ConfirmedAppointments.html">Confirmed Appointments</a></li>
                    <li><a class="appointment-logs" href="../AppointmentLogs/AppointmentLogs.html">Appointment Logs</a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <h2>Confirmed Appointments</h2>
            <div id="feedback-message" class="feedback hidden"></div>

            <div class="feedback">
                
            </div>

            <div class="appointment-details">

            </div>

            <div class="details-section">
                <h4>Appointment Details</h4>
                <div id="details-content"></div>
                <button class="close-btn">&times;</button>
            </div>

            <div class="stats-section">
                <div class="stat-card">
                    <h3>Total Confirmed</h3>
                    <p id="total-pending">0</p>
                </div>
                <div class="stat-card">
                    <h3>Today's Confirmed</h3>
                    <p id="today-pending">0</p>
                </div>
            </div>

            <div class="filters">
                <select id="sort-by">
                    <option value="date-asc">Earliest to Latest</option>
                    <option value="date-desc">Latest to Earliest</option>
                </select>
                <input type="text" id="search-input" placeholder="Search by pet name or owner...">
                <button id="refresh-btn">Search</button>
            </div>

            <div class="appointments-list">
                <!-- Pending appointments will be populated here -->
            </div>

            <div class="bulk-actions">
                <button id="select-all-btn" class="btn btn-secondary">Select All</button>
                <button id="confirm-selected-btn" class="btn btn-primary">Selected Showed-Up</button>
                <button id="cancel-selected-btn" class="btn btn-danger">Selected Didn't Showed-Up</button>
            </div>
        </main>
    </div>

    <script src="ConfirmedAppointments.js"></script>
</body>
</html>
