<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Search.css">
    <link rel="stylesheet" href="../browse_pets/style.css">
    <title>Search Pets - PetEase</title>
</head>
<body>

    <div class="sidebar">
        <h2><i class="fas fa-paw"></i> PetEase</h2>
        <ul>
            <li><a href="../browse_pets/index.html">Browse</a></li>
            <li><a href="../MyProfile/MyProfile.html"> Profile</a></li>
            <li><a href="../Appointment/Appointment.html"></i> Appointment</a></li>
            <li><a href="../RegisterPet/RegisterPet.html">Register Pet</a></li>
            <li><a href="../Message/Message.html"> Messages</a></li>
            <li><a href="../AdoptionRequest/AdoptionRequest.html" class="active"> Adoption Requests</a></li>
            <li class="logout-btn"><a href='../login/index.html'> Logout</a></li>
        </ul>
        </div>
    <div class="main-container">
        <header>
            <h1>Search Pets</h1>
        </header>
        <div class="search-filter">
            <input type="text" id="search-input" placeholder="Search pets by name, breed...">
            <button type="submit" class="search-btn" onclick="">Search</button>
        </div>

            <!-- Search Results Section -->
        <section class="search-results">
            <h2>Search Results</h2>
            <div class="masonry-grid" id="results-container">
                <!-- Search results will be loaded here -->
            </div>
        </section>
          
    </div>


    <div id="pet-profile">
        <!-- Pet profile content will be loaded here -->
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast" style="display: none;"></div>

    <script src="Search.js"></script>
</body>
</html>
