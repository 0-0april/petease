<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetEase - Adoption Requests</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="AdoptionRequest.css">
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h2><i class="fas fa-paw"></i> PetEase</h2>
            <ul>
                <li><a href="../browse_pets/index.html">Browse</a></li>
                <li><a href="../MyProfile/MyProfile.html"> Profile</a></li>
                <li><a href="../Appointment/Appointment.html"></i> Appointment</a></li>
                <li><a href="../RegisterPet/RegisterPet.html">Register Pet</a></li>
                <li><a href="../Message/Message.html"> Messages</a></li>
                <li><a href="AdoptionRequest.html" class="active"> Adoption Requests</a></li>
                <li class="logout-btn"><a href='../login/index.html'> Logout</a></li>
            </ul>
        </div>
        <div class="main-content">
            <header>
                <h1></i> Adoption Requests</h1>
                <p>Manage adoption requests for your pets</p>
            </header>

            <div class="filters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="pending">Pending</button>
                <button class="filter-btn" data-filter="accepted">Accepted</button>
                <button class="filter-btn" data-filter="declined">Declined</button>
            </div>

            <div class="requests-section" id="requests-container">
                <!-- Adoption requests will be loaded here -->
            </div>

            <div class="empty-state" id="empty-state" style="display: none;">
                <i class="fas fa-inbox"></i>
                <h3>No Adoption Requests</h3>
                <p>You don't have any adoption requests yet</p>
            </div>
        </div>
    </div>

    <!-- Modal for request details -->
    <div id="requestModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Request Details</h2>
            <div id="modalBody">
                <!-- Request details will be loaded here -->
            </div>
        </div>
    </div>

    <script src="AdoptionRequest.js"></script>
</body>
</html>
